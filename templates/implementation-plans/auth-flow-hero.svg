<svg viewBox="0 0 640 200" xmlns="http://www.w3.org/2000/svg" style="background:#1a1a1a;border-radius:6px">
  <!-- Boxes -->
  <rect x="20" y="70" width="100" height="60" rx="8" fill="#242424" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="160" y="70" width="100" height="60" rx="8" fill="#242424" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="300" y="70" width="100" height="60" rx="8" fill="#242424" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="440" y="70" width="100" height="60" rx="8" fill="#242424" stroke="#2a2a2a" stroke-width="1.5"/>
  <rect x="540" y="30" width="80" height="60" rx="8" fill="#242424" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="540" y="110" width="80" height="60" rx="8" fill="#242424" stroke="#6366f1" stroke-width="1.5"/>

  <!-- Labels -->
  <text x="70" y="105" text-anchor="middle" fill="#e8e8e8" font-family="-apple-system,sans-serif" font-size="12" font-weight="600">User</text>
  <text x="210" y="97" text-anchor="middle" fill="#e8e8e8" font-family="-apple-system,sans-serif" font-size="11" font-weight="600">Register</text>
  <text x="210" y="112" text-anchor="middle" fill="#888888" font-family="-apple-system,sans-serif" font-size="10">/signup</text>
  <text x="350" y="97" text-anchor="middle" fill="#e8e8e8" font-family="-apple-system,sans-serif" font-size="11" font-weight="600">Login</text>
  <text x="350" y="112" text-anchor="middle" fill="#888888" font-family="-apple-system,sans-serif" font-size="10">/login</text>
  <text x="490" y="97" text-anchor="middle" fill="#e8e8e8" font-family="-apple-system,sans-serif" font-size="11" font-weight="600">Auth</text>
  <text x="490" y="112" text-anchor="middle" fill="#888888" font-family="-apple-system,sans-serif" font-size="10">Verify JWT</text>
  <text x="580" y="57" text-anchor="middle" fill="#e8e8e8" font-family="-apple-system,sans-serif" font-size="11" font-weight="600">Access</text>
  <text x="580" y="70" text-anchor="middle" fill="#888888" font-family="-apple-system,sans-serif" font-size="10">15 min</text>
  <text x="580" y="137" text-anchor="middle" fill="#e8e8e8" font-family="-apple-system,sans-serif" font-size="11" font-weight="600">Refresh</text>
  <text x="580" y="150" text-anchor="middle" fill="#888888" font-family="-apple-system,sans-serif" font-size="10">7 days</text>

  <!-- Arrows -->
  <line x1="120" y1="100" x2="155" y2="100" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="100" x2="295" y2="100" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="100" x2="435" y2="100" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="60" x2="535" y2="80" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="140" x2="535" y2="115" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6366f1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="320" y="22" text-anchor="middle" fill="#888888" font-family="-apple-system,sans-serif" font-size="11" letter-spacing="0.05em">JWT AUTHENTICATION FLOW</text>
</svg>
